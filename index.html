<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MKP Shop | Premium Coconut Portal</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --primary-green: #2D4739;
            --accent-green: #4F772D;
            --light-green: #90A955;
            --coconut-cream: #ECF39E;
            --white-glass: rgba(255, 255, 255, 0.5);
            --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: #f0f4f0;
            overflow: hidden;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Animated Background */
        .bg-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(135deg, rgba(144, 169, 85, 0.2) 0%, rgba(236, 243, 158, 0.2) 100%);
        }

        .bg-trees {
            position: absolute;
            top: -5%;
            left: -5%;
            width: 110%;
            height: 110%;
            background: url('images/bg-trees.png') center/cover no-repeat;
            filter: brightness(0.9) contrast(1.1);
            animation: sway 15s ease-in-out infinite alternate;
            transform-origin: bottom center;
        }

        .sunlight {
            position: absolute;
            top: -10%;
            right: -10%;
            width: 50%;
            height: 50%;
            background: radial-gradient(circle, rgba(255, 255, 255, 0.4) 0%, rgba(255, 255, 255, 0) 70%);
            pointer-events: none;
        }

        .floating-coconuts {
            position: absolute;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .coconut {
            position: absolute;
            opacity: 0.15;
            width: 80px;
            animation: float 8s ease-in-out infinite;
        }

        @keyframes sway {
            from {
                transform: rotate(-1deg) scale(1.02);
            }

            to {
                transform: rotate(1deg) scale(1.05);
            }
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            50% {
                transform: translateY(-20px) rotate(10deg);
            }
        }

        /* Glass Login Card */
        .login-card {
            background: var(--white-glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 20px;
            padding: 3rem;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.15);
            position: relative;
            z-index: 10;
            text-align: center;
        }

        .login-card h1 {
            font-family: 'Playfair Display', serif;
            color: var(--primary-green);
            font-size: 2.8rem;
            margin-bottom: 0.2rem;
            letter-spacing: -1px;
        }

        .login-card p {
            color: #555;
            font-size: 1rem;
            margin-bottom: 2.5rem;
            font-weight: 300;
        }

        /* Tabs */
        .tabs-container {
            display: flex;
            background: rgba(0, 0, 0, 0.05);
            border-radius: 12px;
            padding: 4px;
            margin-bottom: 2rem;
            position: relative;
        }

        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: none;
            cursor: pointer;
            font-weight: 600;
            color: #666;
            z-index: 1;
            transition: color 0.3s ease;
        }

        .tab-btn.active {
            color: var(--primary-green);
        }

        .tab-slider {
            position: absolute;
            top: 4px;
            left: 4px;
            width: calc(50% - 4px);
            height: calc(100% - 8px);
            background: white;
            border-radius: 9px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.05);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Forms */
        .login-form {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            text-align: left;
            transition: var(--transition);
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .form-group label {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--primary-green);
            margin-left: 2px;
        }

        .form-group input {
            padding: 14px 18px;
            border: 2px solid transparent;
            background: rgba(255, 255, 255, 0.7);
            border-radius: 12px;
            font-family: inherit;
            font-size: 1rem;
            transition: var(--transition);
            box-shadow: inset 0 2px 4px rgba(0, 0, 0, 0.02);
        }

        .form-group input:hover {
            background: rgba(255, 255, 255, 0.9);
        }

        .form-group input:focus {
            outline: none;
            background: white;
            border-color: var(--accent-green);
            box-shadow: 0 0 0 4px rgba(79, 119, 45, 0.1);
        }

        /* Button */
        .login-btn {
            background: linear-gradient(135deg, var(--accent-green) 0%, #31572C 100%);
            color: white;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 20px -5px rgba(49, 87, 44, 0.4);
            position: relative;
            overflow: hidden;
            margin-top: 1rem;
        }

        .login-btn:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 15px 25px -5px rgba(49, 87, 44, 0.5), 0 0 15px var(--accent-green);
        }

        .login-btn:active {
            transform: translateY(0);
        }

        /* Ripple Effect */
        .ripple {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0);
            animation: ripple-animation 0.6s linear;
            pointer-events: none;
        }

        @keyframes ripple-animation {
            to {
                transform: scale(4);
                opacity: 0;
            }
        }

        .hidden {
            display: none;
        }

        .error-msg {
            color: #d62828;
            font-size: 0.85rem;
            text-align: center;
            margin-top: 0.8rem;
            min-height: 1.2rem;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .error-msg.visible {
            opacity: 1;
        }

        .success-msg {
            color: #166534;
        }

        /* Toggle Link */
        .toggle-link {
            text-align: center;
            margin-top: 1.2rem;
            font-size: 0.9rem;
            color: #666;
        }

        .toggle-link a {
            color: var(--accent-green);
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .toggle-link a:hover {
            color: var(--primary-green);
            text-decoration: underline;
        }

        /* Register form transition */
        .form-slide {
            animation: slideUp 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(15px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Mobile Responsive */
        @media (max-width: 480px) {
            .login-card {
                padding: 2rem;
            }

            .login-card h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>

<body>
    <!-- Background Layer -->
    <div class="bg-container">
        <div class="bg-trees" id="parallax-bg"></div>
        <div class="sunlight"></div>
        <div class="floating-coconuts">
            <img src="images/coconut-item.png" class="coconut" style="top: 15%; left: 10%; animation-delay: 0s;">
            <img src="images/coconut-item.png" class="coconut"
                style="top: 60%; left: 85%; animation-delay: 2s; width: 60px;">
            <img src="images/coconut-item.png" class="coconut"
                style="top: 80%; left: 15%; animation-delay: 4s; width: 100px;">
        </div>
    </div>

    <!-- Login UI -->
    <div class="login-card">
        <h1>MKP Shop</h1>
        <p>Your portal to premium coconuts</p>

        <div class="tabs-container" id="tabs-container">
            <div class="tab-slider" id="tab-slider"></div>
            <button class="tab-btn active" onclick="switchTab('user')">User Login</button>
            <button class="tab-btn" onclick="switchTab('admin')">Admin Login</button>
        </div>

        <!-- User Login Form -->
        <form id="user-login-form" class="login-form">
            <div class="form-group">
                <label for="user-name">Username</label>
                <input type="text" id="user-name" placeholder="Enter your name" required>
            </div>
            <div class="form-group">
                <label for="user-pass">Phone Number</label>
                <input type="password" id="user-pass" placeholder="Enter 10-digit number" required maxlength="10"
                    minlength="10" pattern="\d{10}"
                    oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);">
            </div>
            <button type="submit" class="login-btn">Login to Shop</button>
            <div id="user-error" class="error-msg"></div>
            <div class="toggle-link">
                Don't have an account? <a onclick="toggleRegister(true)">Register here</a>
            </div>
        </form>

        <!-- Register Form -->
        <form id="register-form" class="login-form hidden">
            <div class="form-group">
                <label for="reg-name">Full Name</label>
                <input type="text" id="reg-name" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label for="reg-phone">Phone Number</label>
                <input type="tel" id="reg-phone" placeholder="Enter 10-digit number" required maxlength="10"
                    minlength="10" pattern="\d{10}"
                    oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);">
            </div>
            <div class="form-group">
                <label for="reg-confirm">Confirm Phone Number</label>
                <input type="tel" id="reg-confirm" placeholder="Re-enter 10-digit number" required maxlength="10"
                    minlength="10" pattern="\d{10}"
                    oninput="this.value = this.value.replace(/[^0-9]/g, '').slice(0, 10);">
            </div>
            <button type="submit" class="login-btn"
                style="background: linear-gradient(135deg, #31572C 0%, #4F772D 100%);">Create Account</button>
            <div id="reg-error" class="error-msg"></div>
            <div class="toggle-link">
                Already have an account? <a onclick="toggleRegister(false)">Login here</a>
            </div>
        </form>

        <!-- Admin Form -->
        <form id="admin-login-form" class="login-form hidden">
            <div class="form-group">
                <label for="admin-name">Admin Name</label>
                <input type="text" id="admin-name" placeholder="Management ID" required>
            </div>
            <div class="form-group">
                <label for="admin-pass">Security Key</label>
                <input type="password" id="admin-pass" placeholder="Enter security key" required>
            </div>
            <button type="submit" class="login-btn"
                style="background: linear-gradient(135deg, #132A13 0%, #000000 100%);">Admin Access</button>
            <div id="admin-error" class="error-msg"></div>
        </form>
    </div>

    <!-- Firebase Compat SDK (works with file:// protocol) -->
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.14.1/firebase-firestore-compat.js"></script>
    <script src="firebase-config.js"></script>

    <script>
        // Parallax Effect
        document.addEventListener('mousemove', (e) => {
            const bg = document.getElementById('parallax-bg');
            const x = (window.innerWidth - e.clientX * 2) / 100;
            const y = (window.innerHeight - e.clientY * 2) / 100;
            bg.style.transform = `translate(${x}px, ${y}px) scale(1.05)`;
        });

        // Toggle between Login and Register forms
        function toggleRegister(showRegister) {
            const loginForm = document.getElementById('user-login-form');
            const registerForm = document.getElementById('register-form');
            const adminForm = document.getElementById('admin-login-form');
            const tabsContainer = document.getElementById('tabs-container');

            adminForm.classList.add('hidden');

            if (showRegister) {
                loginForm.classList.add('hidden');
                registerForm.classList.remove('hidden');
                registerForm.classList.add('form-slide');
                if (tabsContainer) tabsContainer.style.display = 'none';
            } else {
                registerForm.classList.add('hidden');
                loginForm.classList.remove('hidden');
                loginForm.classList.add('form-slide');
                if (tabsContainer) tabsContainer.style.display = 'flex';
                // Reset User Login tab to active
                const tabs = document.querySelectorAll('.tab-btn');
                const slider = document.getElementById('tab-slider');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
                slider.style.transform = 'translateX(0)';
            }
        }

        // Tab Switching
        function switchTab(tab) {
            const userForm = document.getElementById('user-login-form');
            const adminForm = document.getElementById('admin-login-form');
            const registerForm = document.getElementById('register-form');
            const tabs = document.querySelectorAll('.tab-btn');
            const slider = document.getElementById('tab-slider');
            const tabsContainer = document.getElementById('tabs-container');

            // Always hide register form and show tabs when switching
            registerForm.classList.add('hidden');
            if (tabsContainer) tabsContainer.style.display = 'flex';

            if (tab === 'user') {
                userForm.classList.remove('hidden');
                adminForm.classList.add('hidden');
                tabs[0].classList.add('active');
                tabs[1].classList.remove('active');
                slider.style.transform = 'translateX(0)';
            } else {
                userForm.classList.add('hidden');
                adminForm.classList.remove('hidden');
                tabs[0].classList.remove('active');
                tabs[1].classList.add('active');
                slider.style.transform = 'translateX(100%)';
            }
        }

        // Ripple Effect Implementation
        document.querySelectorAll('.login-btn').forEach(button => {
            button.addEventListener('click', function (e) {
                let x = e.clientX - e.target.getBoundingClientRect().left;
                let y = e.clientY - e.target.getBoundingClientRect().top;

                let ripples = document.createElement('span');
                ripples.className = 'ripple';
                ripples.style.left = x + 'px';
                ripples.style.top = y + 'px';
                this.appendChild(ripples);

                setTimeout(() => {
                    ripples.remove();
                }, 600);
            });
        });

        // Helper: Show loading state on button
        function setButtonLoading(btn, loading) {
            if (loading) {
                btn.dataset.originalText = btn.innerText;
                btn.innerText = 'Please wait...';
                btn.disabled = true;
                btn.style.opacity = '0.7';
            } else {
                btn.innerText = btn.dataset.originalText || btn.innerText;
                btn.disabled = false;
                btn.style.opacity = '1';
            }
        }

        // ==========================================
        // USER LOGIN (with Firebase)
        // ==========================================
        document.getElementById('user-login-form').onsubmit = async function (e) {
            e.preventDefault();
            const name = document.getElementById('user-name').value.trim();
            const pass = document.getElementById('user-pass').value.trim();
            const error = document.getElementById('user-error');
            const btn = this.querySelector('.login-btn');

            if (!name || !pass) {
                error.innerText = "Please fill all fields.";
                error.classList.add('visible');
                setTimeout(() => error.classList.remove('visible'), 3000);
                return;
            }

            setButtonLoading(btn, true);
            error.classList.remove('visible');

            try {
                const result = await window.firebaseDB.loginUser(name, pass);

                if (result.success) {
                    localStorage.setItem('currentUser', JSON.stringify({
                        name: result.data.name || name,
                        pass: pass,
                        phone: pass,
                        role: 'user'
                    }));

                    error.style.color = '#166534';
                    error.innerText = '✓ Login successful! Redirecting...';
                    error.classList.add('visible');

                    setTimeout(() => {
                        window.location.href = 'home.html';
                    }, 800);
                } else {
                    error.style.color = '#d62828';
                    error.innerText = result.error || "Login failed. Please try again.";
                    error.classList.add('visible');
                    setButtonLoading(btn, false);
                    setTimeout(() => error.classList.remove('visible'), 3000);
                }
            } catch (err) {
                console.error('Login error:', err);
                localStorage.setItem('currentUser', JSON.stringify({ name, pass, phone: pass, role: 'user' }));
                window.location.href = 'home.html';
            }
        };

        // ==========================================
        // REGISTER ACCOUNT (with Firebase)
        // ==========================================
        document.getElementById('register-form').onsubmit = async function (e) {
            e.preventDefault();
            const name = document.getElementById('reg-name').value.trim();
            const phone = document.getElementById('reg-phone').value.trim();
            const confirmPhone = document.getElementById('reg-confirm').value.trim();
            const error = document.getElementById('reg-error');
            const btn = this.querySelector('.login-btn');

            if (!name || !phone || !confirmPhone) {
                error.style.color = '#d62828';
                error.innerText = "Please fill all fields.";
                error.classList.add('visible');
                setTimeout(() => error.classList.remove('visible'), 3000);
                return;
            }

            if (phone.length !== 10) {
                error.style.color = '#d62828';
                error.innerText = "Phone number must be 10 digits.";
                error.classList.add('visible');
                setTimeout(() => error.classList.remove('visible'), 3000);
                return;
            }

            if (phone !== confirmPhone) {
                error.style.color = '#d62828';
                error.innerText = "Phone numbers do not match.";
                error.classList.add('visible');
                setTimeout(() => error.classList.remove('visible'), 3000);
                return;
            }

            setButtonLoading(btn, true);
            error.classList.remove('visible');

            try {
                const result = await window.firebaseDB.registerUser(name, phone);

                if (result.success) {
                    if (result.exists) {
                        error.style.color = '#854d0e';
                        error.innerText = 'Account already exists! Redirecting to login...';
                        error.classList.add('visible');

                        setTimeout(() => {
                            toggleRegister(false);
                            document.getElementById('user-name').value = name;
                            document.getElementById('user-pass').value = phone;
                            setButtonLoading(btn, false);
                            error.classList.remove('visible');
                        }, 1500);
                    } else {
                        error.style.color = '#166534';
                        error.innerText = '✓ Account created successfully! Redirecting to login...';
                        error.classList.add('visible');

                        setTimeout(() => {
                            toggleRegister(false);
                            document.getElementById('user-name').value = name;
                            document.getElementById('user-pass').value = phone;
                            setButtonLoading(btn, false);
                            error.classList.remove('visible');
                            document.getElementById('register-form').reset();
                        }, 1500);
                    }
                } else {
                    error.style.color = '#d62828';
                    error.innerText = result.error || "Registration failed. Please try again.";
                    error.classList.add('visible');
                    setButtonLoading(btn, false);
                    setTimeout(() => error.classList.remove('visible'), 3000);
                }
            } catch (err) {
                console.error('Register error:', err);
                error.style.color = '#d62828';
                error.innerText = "Network error. Please try again.";
                error.classList.add('visible');
                setButtonLoading(btn, false);
                setTimeout(() => error.classList.remove('visible'), 3000);
            }
        };

        // ==========================================
        // ADMIN LOGIN (with Firebase)
        // ==========================================
        document.getElementById('admin-login-form').onsubmit = async function (e) {
            e.preventDefault();
            const name = document.getElementById('admin-name').value.trim();
            const pass = document.getElementById('admin-pass').value.trim();
            const error = document.getElementById('admin-error');
            const btn = this.querySelector('.login-btn');

            setButtonLoading(btn, true);

            try {
                const result = await window.firebaseDB.loginAdmin(name, pass);

                if (result.success) {
                    localStorage.setItem('currentUser', JSON.stringify({ name, role: 'admin' }));

                    error.style.color = '#166534';
                    error.innerText = '✓ Admin access granted! Redirecting...';
                    error.classList.add('visible');

                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 800);
                } else {
                    error.style.color = '#d62828';
                    error.innerText = "Access Denied: Invalid Credentials";
                    error.classList.add('visible');
                    setButtonLoading(btn, false);
                    setTimeout(() => error.classList.remove('visible'), 3000);
                }
            } catch (err) {
                if (name === '23bit66' && pass === '12122023') {
                    localStorage.setItem('currentUser', JSON.stringify({ name, role: 'admin' }));
                    window.location.href = 'admin.html';
                } else {
                    error.style.color = '#d62828';
                    error.innerText = "Access Denied: Invalid Credentials";
                    error.classList.add('visible');
                    setButtonLoading(btn, false);
                    setTimeout(() => error.classList.remove('visible'), 3000);
                }
            }
        };
    </script>
</body>

</html>
